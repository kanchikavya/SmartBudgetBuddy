<!DOCTYPE html>
<!-- <html lang="en" class="transition-colors duration-300 dark"> -->
    <html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Budget Buddy</title>

  <!--  Tailwind config BEFORE loading -->
  <script>
    window.tailwind = {
      config: {
        darkMode: 'class'
      }
    };
  </script>

  <!--  Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!--  Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>

  <!--  Your JS -->
  <script src="script.js" defer></script>
  <style>
  @keyframes fade-in-down {
    from {
      opacity: 0;
      transform: translateY(-20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animate-fade-in-down {
    animation: fade-in-down 0.6s ease-out both;
  }

  @keyframes bounce-in {
    0% { transform: scale(0.9); opacity: 0; }
    60% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); }
  }

  .animate-bounce-in {
    animation: bounce-in 0.4s ease-out;
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .animate-fade-in {
    animation: fade-in 0.8s ease forwards;
  }
</style>

</head>

<body class="bg-gray-100 text-gray-900 transition-colors duration-300">

  <!-- 🌙 Theme Toggle -->
  <button id="theme-toggle" class="absolute top-4 right-4 bg-gray-800 text-white px-4 py-2 rounded hover:bg-black">
    🌙 Dark Mode
  </button>

  <h1 class="text-3xl font-bold text-green-700 dark:text-green-400 my-6 text-center">
    💰 SMART BUDGET BUDDY
  </h1>

<div class="max-w-xl mx-auto p-4 bg-white dark:bg-gray-800 shadow-lg rounded-xl space-y-4
            animate-fade-in-down">


    <form id="expense-form" class="flex flex-col space-y-2">
      <input type="text" id="title" placeholder="Expense Title" required class="border px-3 py-2 rounded dark:bg-gray-700 dark:text-white" />
      <input type="number" id="amount" placeholder="Amount ₹" required class="border px-3 py-2 rounded dark:bg-gray-700 dark:text-white" />
      <input type="date" id="date" required class="border px-3 py-2 rounded dark:bg-gray-700 dark:text-white" />
      <select id="category" class="border px-3 py-2 rounded dark:bg-gray-700 dark:text-white">
        <option value="food">🍅 Food</option>
        <option value="transport">🚌 Transport</option>
        <option value="shopping">🛍️ Shopping</option>
        <option value="bills">💵 Bills</option>
      </select>
      <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded transition duration-300 ease-in-out transform hover:scale-105">

        ➕ Add Expense
      </button>
    </form>

    <select id="filter-category" class="w-full border px-3 py-2 rounded dark:bg-gray-700 dark:text-white">
      <option value="all">📋 Show All</option>
      <option value="food">🍅 Food</option>
      <option value="transport">🚌 Transport</option>
      <option value="shopping">🛍️ Shopping</option>
      <option value="bills">💵 Bills</option>
    </select>

    <div id="total" class="font-bold text-lg text-gray-700 dark:text-white bg-green-100 dark:bg-green-800 p-2 rounded">
      Total: ₹0
    </div>

    <ul id="expense-list" class="space-y-2 text-gray-800 dark:text-white"></ul>

    <canvas id="expense-chart" width="300" height="150" class="mt-4 mx-auto animate-fade-in"></canvas>

  </div>
</body>
</html>
